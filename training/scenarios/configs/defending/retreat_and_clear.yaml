name: Retreat and Clear
skill: defender
description: Ball rolling toward the blue goal. Car must retreat and clear the ball away.

initial_state:
  ball:
    location:
      x: {min: -1500.0, max: 1500.0}
      y: {min: -4500.0, max: -2500.0}
      z: {fixed: 100.0}
    velocity:
      x: {fixed: 0.0}
      y: {min: -800.0, max: -200.0}
      z: {fixed: 0.0}
  car:
    location:
      x: {min: -1000.0, max: 1000.0}
      y: {min: -3000.0, max: -1500.0}
      z: {fixed: 0.0}
    rotation:
      yaw: {random: true}
    boost: {min: 0.0, max: 50.0}

reward:
  terminal:
  - {type: ball_cleared, value: 1.0}
  - {type: goal_scored, value: -1.0}
  - {type: timeout, seconds: 10.0, value: -0.5}
  step:
  - {type: ball_from_goal, weight: 0.01}

training:
  max_episodes: 10000
  save_every: 500
  model_path: models/defender.weights
