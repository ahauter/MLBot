name: Low Aerial - Center Field
description: Ball launched upward from center; both cars compete to make aerial contact first.

initial_state:
  ball:
    location:
      x: {min: -600.0, max: 600.0}
      y: {min: -500.0, max: 500.0}
      z: {fixed: 100.0}
    velocity:
      x: {fixed: 0.0}
      y: {fixed: 0.0}
      z: {min: 600.0, max: 900.0}
  blue:
    skill: aerial
    location:
      x: {min: -400.0, max: 400.0}
      y: {min: -800.0, max: -200.0}
      z: {fixed: 0.0}
    rotation:
      yaw: {random: true}
    boost: {min: 50.0, max: 100.0}
  orange:
    skill: aerial
    location:
      x: {min: -400.0, max: 400.0}
      y: {min: 200.0, max: 800.0}
      z: {fixed: 0.0}
    rotation:
      yaw: {random: true}
    boost: {min: 50.0, max: 100.0}

reward:
  blue:
    terminal:
    - {type: aerial_hit, value: 1.0}
    - {type: ball_grounded, value: -0.5}
    - {type: timeout, seconds: 6.0, value: -1.0}
    step:
    - {type: car_near_ball, weight: 0.005}
  orange:
    terminal:
    - {type: aerial_hit, value: 1.0}
    - {type: ball_grounded, value: -0.5}
    - {type: timeout, seconds: 6.0, value: -1.0}
    step:
    - {type: car_near_ball, weight: 0.005}

training:
  max_episodes: 10000
  save_every: 500
  model_path: models/
