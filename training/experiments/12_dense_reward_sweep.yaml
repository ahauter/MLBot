# Sweep: Axis 4 → 1 (Reward Engineering → Simulation Savings)
# ============================================================
# Vary the number of active dense reward components from 0 (sparse)
# to 7 (full dense). Measures the Axis 4 → Axis 1 marginal return.

name: dense_reward_sweep
description: >
  Sweep dense reward complexity: 0 (sparse), 1, 3, 5, 7 active
  components. Measures how much reward engineering investment
  reduces simulation cost.
intervention: dense_reward

base_config:
  algo: AWAC
  reward_type: dense
  total_steps: 50000000
  eval_interval: 200000
  batch_size: 256
  gamma: 0.99
  actor_lr: 0.0003
  critic_lr: 0.0003
  tau: 0.005
  awac_lambda: 1.0
  explore_noise: 0.1

budget:
  sim_steps: 50000000
  num_replays: 0
  num_labels: 0
  reward_components: 0
  pretrain_gpu_hours: 0.0

seeds: [0, 1, 2, 3, 4]

sweep:
  - name: sparse_only
    overrides:
      reward_type: sparse
      dense_reward_weights: null
    budget_overrides:
      reward_components: 0

  - name: components_1
    overrides:
      dense_reward_weights:
        ball_touch: 0.05
        shot_line: 0.0
        ball_proximity: 0.0
        ball_to_goal: 0.0
        grounded: 0.0
        car_velocity: 0.0
        velocity_shot_axis: 0.0
    budget_overrides:
      reward_components: 1

  - name: components_3
    overrides:
      dense_reward_weights:
        ball_touch: 0.05
        ball_proximity: 0.005
        ball_to_goal: 0.005
        shot_line: 0.0
        grounded: 0.0
        car_velocity: 0.0
        velocity_shot_axis: 0.0
    budget_overrides:
      reward_components: 3

  - name: components_5
    overrides:
      dense_reward_weights:
        ball_touch: 0.05
        shot_line: 0.003
        ball_proximity: 0.005
        ball_to_goal: 0.005
        velocity_shot_axis: 0.003
        grounded: 0.0
        car_velocity: 0.0
    budget_overrides:
      reward_components: 5

  - name: components_7
    overrides:
      dense_reward_weights:
        ball_touch: 0.05
        shot_line: 0.003
        ball_proximity: 0.005
        ball_to_goal: 0.005
        grounded: 0.001
        car_velocity: 0.001
        velocity_shot_axis: 0.003
    budget_overrides:
      reward_components: 7

wandb_project: rlbot-baseline
wandb_tags:
  - sweep
  - axis4-to-axis1
  - dense-reward
