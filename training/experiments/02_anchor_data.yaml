# Anchor: Data-Dominant
# ======================
# IQL on replay data only, zero online simulation steps.
# Establishes the Axis 2 (real-world data) dominant frontier.

name: anchor_data
description: >
  IQL on 1000 replays, pure offline RL with zero simulation.
  Establishes the Axis 2 (data) dominant frontier — how much
  can we learn from demonstrations alone?
intervention: offline_replays

base_config:
  algo: IQL
  reward_type: sparse
  total_steps: 500000
  eval_interval: 50000
  batch_size: 256
  gamma: 0.99
  actor_lr: 0.0003
  critic_lr: 0.0003
  tau: 0.005
  replay_seed_dir: training/replay_data/parsed

budget:
  sim_steps: 500000
  num_replays: 1000
  num_labels: 0
  reward_components: 0
  pretrain_gpu_hours: 0.0

seeds: [0, 1, 2, 3, 4]

wandb_project: rlbot-baseline
wandb_tags:
  - anchor
  - data-dominant
  - axis2
  - offline
