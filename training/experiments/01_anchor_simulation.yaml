# Anchor: Simulation-Dominant
# ============================
# SAC with high simulation budget, sparse reward, no data/labels.
# Establishes Axis 1 (simulation) as the sole resource.

name: anchor_simulation
description: >
  SAC from scratch with sparse reward, relying entirely on simulation
  steps. Establishes the Axis 1 (simulation) dominant frontier.
intervention: none

base_config:
  algo: SAC
  reward_type: sparse
  total_steps: 50000000
  eval_interval: 200000
  batch_size: 256
  gamma: 0.99
  actor_lr: 0.0003
  critic_lr: 0.0003
  tau: 0.005
  explore_noise: 0.1

budget:
  sim_steps: 50000000
  num_replays: 0
  num_labels: 0
  reward_components: 0
  pretrain_gpu_hours: 0.0

seeds: [0, 1, 2, 3, 4]

wandb_project: rlbot-baseline
wandb_tags:
  - anchor
  - simulation-dominant
  - axis1
