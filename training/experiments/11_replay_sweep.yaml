# Sweep: Axis 2 → 1 (Replay Data → Simulation Savings)
# =====================================================
# Pre-load varying amounts of replay data into the buffer,
# then train AWAC online. Measures how many simulation steps
# N replays save compared to the zero-data baseline.

name: replay_sweep
description: >
  Sweep offline data seeding: 0, 50, 100, 500, 1000 replays loaded
  into the buffer before online AWAC training. Measures Axis 2 → Axis 1
  marginal return: how many simulation steps does each replay save?
intervention: offline_replays

base_config:
  algo: AWAC
  reward_type: sparse
  total_steps: 50000000
  eval_interval: 200000
  batch_size: 256
  gamma: 0.99
  actor_lr: 0.0003
  critic_lr: 0.0003
  tau: 0.005
  awac_lambda: 1.0
  explore_noise: 0.1

budget:
  sim_steps: 50000000
  num_replays: 0
  num_labels: 0
  reward_components: 0
  pretrain_gpu_hours: 0.0

seeds: [0, 1, 2, 3, 4]

sweep:
  - name: replays_0
    overrides: {}
    budget_overrides:
      num_replays: 0

  - name: replays_50
    overrides:
      replay_seed_dir: training/replay_data/parsed_50
    budget_overrides:
      num_replays: 50

  - name: replays_100
    overrides:
      replay_seed_dir: training/replay_data/parsed_100
    budget_overrides:
      num_replays: 100

  - name: replays_500
    overrides:
      replay_seed_dir: training/replay_data/parsed_500
    budget_overrides:
      num_replays: 500

  - name: replays_1000
    overrides:
      replay_seed_dir: training/replay_data/parsed_1000
    budget_overrides:
      num_replays: 1000

wandb_project: rlbot-baseline
wandb_tags:
  - sweep
  - axis2-to-axis1
  - replay-data
