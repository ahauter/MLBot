# Naive Baseline — Zero Point
# ============================
# AWAC with sparse reward, no data, no pre-training, no labels.
# This is the zero point for all cross-axis comparisons.
# A naive baseline that struggles or fails is valid data —
# it quantifies the sparse-reward penalty.

name: naive_baseline
description: >
  AWAC with sparse reward (goals only), no replay data, no pre-training,
  no human labels. The zero-cost reference against which all interventions
  are measured.
intervention: none

base_config:
  algo: AWAC
  reward_type: sparse
  total_steps: 50000000
  eval_interval: 200000
  batch_size: 256
  gamma: 0.99
  actor_lr: 0.0003
  critic_lr: 0.0003
  tau: 0.005
  awac_lambda: 1.0
  explore_noise: 0.1

budget:
  sim_steps: 50000000
  num_replays: 0
  num_labels: 0
  reward_components: 0
  pretrain_gpu_hours: 0.0

seeds: [0, 1, 2, 3, 4]

wandb_project: rlbot-baseline
wandb_tags:
  - baseline
  - naive
  - zero-point
