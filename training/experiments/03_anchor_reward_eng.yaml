# Anchor: Reward Engineering-Dominant
# ====================================
# AWAC with full dense reward (all 7 components).
# Establishes the Axis 4 (reward engineering) dominant frontier.

name: anchor_reward_eng
description: >
  AWAC with all 7 dense reward components enabled. Tests how much
  hand-crafted reward shaping reduces simulation cost compared to
  the sparse-only baseline.
intervention: dense_reward

base_config:
  algo: AWAC
  reward_type: dense
  total_steps: 50000000
  eval_interval: 200000
  batch_size: 256
  gamma: 0.99
  actor_lr: 0.0003
  critic_lr: 0.0003
  tau: 0.005
  awac_lambda: 1.0
  explore_noise: 0.1

budget:
  sim_steps: 50000000
  num_replays: 0
  num_labels: 0
  reward_components: 7
  pretrain_gpu_hours: 0.0

seeds: [0, 1, 2, 3, 4]

wandb_project: rlbot-baseline
wandb_tags:
  - anchor
  - reward-eng-dominant
  - axis4
  - dense-reward
