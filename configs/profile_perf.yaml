algorithm:
  class: training.algorithms.ppo.PPOAlgorithm

scheduler:
  class: training.schedulers.SerialScheduler

opponent_pool:
  class: training.opponents.population.Population
  params:
    agents: 4
    generation_steps: 10000
    generation_noise_scale: 0.01

seed: 0
total_steps: 100000
num_envs: 8
t_window: 8
log_interval: 5

profiling:
  enabled: true
  report: models/profiling_report.md
  waterfall: models/waterfall.png
  waterfall_rounds: 2

wandb:
  enabled: false
